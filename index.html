<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TurfProwler</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2f7d32">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        * {
            font-family: monospace;
            text-transform: uppercase;
        }

        body {
            margin: 0;
            padding: none;
            border: none;
            background-color: #555555;
            color: white;
        }

        button {
            border: none;
        }

        #new-street-view {
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-columns: 25vw 25vw 25vw 25vw;
            grid-template-rows: 40vh 10vh 10vh 40vh;
        }

        #new-street-view #add-street {
            grid-column-start: 2;
            grid-column-end: 3;
            grid-row-start: 3;
            grid-row-end: 4;
            margin: 0.5rem;
            background-color: lightgreen;;
        }

        #new-street-view #cancel {
            grid-column-start: 3;
            grid-column-end: 4;
            grid-row-start: 3;
            grid-row-end: 4;
            margin: 0.5rem;
            background-color: lightcoral;
        }

        #new-street-view #street-name {
            grid-row-start: 2;
            grid-row-end: 3;
            grid-column-start: 1;
            grid-column-end: 5;
            margin: 0.5rem;
            font-size: 2rem;
        }

        #street-menu-view {
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-columns: 80vw 20vw;
            grid-template-rows: 90vh 10vh;
        }

        #street-menu-view #streets {
            grid-column: 1 / 3;
            grid-row-start: 1;
            grid-row-end: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-y: scroll;
            gap: 0.25rem;
        }

        #street-menu-view #streets button {
            display: block;
            width: 100%;
            height: 2rem;
            background-color: lightblue;
        }

        #street-menu-view #add-new-street {
            grid-column: 1 / 1;
            grid-row-start: 2;
            grid-row-end: 2;
            background-color: lightgreen;
            margin: 1rem;
        }

        #street-menu-view #clean-up {
            grid-column: 2 / 2;
            grid-row: 2 2;
            background-color: lightcoral;
            margin: 1rem;
        }

        #street-view {
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-rows: 10vh 90vh;
        }

        #street-view #nav {
            width: 100vw;
            grid-row-start: 1;
            grid-row-end: 2;
            display: grid;
            grid-template-columns: 20vw 80vw;
        }

        #street-view #nav #current-street {
            grid-column-start: 2;
            grid-column-end: 2;
            display: block;
            text-align: right;
            margin: 1rem;
            font-size: 1.5rem;
            text-align: left;
            height: 2rem;
        }

        #street-view #nav #back {
            grid-column-start: 1;
            grid-column-end: 2;
            margin: 1rem;
            background-color: lightcoral;
            height: 2rem;
        }

        #street-view #doors {
            display: grid;
            grid-column-gap: 1rem;
            row-gap: 1rem;
            grid-template-columns: 5rem 5rem 5rem 5rem 5rem;
            grid-auto-rows: 3rem;
            justify-self: center;
            overflow-y: scroll;
        }

        #street-view #doors button {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .door-no {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .status {
            font-style: italic;
        }

    </style>
</head>
<body>
    <div id="new-street-view">
        <input type="text" id="street-name" value=""/>
        <button id="add-street" disabled>Add</button>
        <button id="cancel">Cancel</button>
    </div>
    <div id="street-menu-view">
        <div id="streets">
            <!-- Streets go here -->
        </div>
        <button id="add-new-street">New Street</button>
        <button id="clean-up">Clean Up</button>
    </div>
    <div id="street-view">
        <div id="nav">
            <button id="back">Back</button>
            <span id="current-street"></span>
        </div>
        <div id="doors">
            <!-- Doors go here -->
        </div>
    </div>
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("./sw.js");
            });
        }
    </script>
    <script>
        const STATUS_UNKNOCKED = 0;
        const STATUS_KNOCKED = 1;
        const STATUS_CONTACT = 2;
        const STATUS_QUALIFIER = 3;
        const STATUS_BOOKED = 4;

        function nextStatus(status) {
            return (status + 1) % (STATUS_BOOKED + 1);
        }

        function statusToString(status) {
            switch (status) {
                case STATUS_UNKNOCKED:
                    return "U";
                case STATUS_KNOCKED:
                    return "K";
                case STATUS_CONTACT:
                    return "C";
                case STATUS_QUALIFIER:
                    return "Q";
                case STATUS_BOOKED:
                    return "B";
            }
        }

        function statusToBg(status) {
            switch (status) {
                case STATUS_UNKNOCKED:
                    return "lightgrey";
                case STATUS_KNOCKED:
                    return "lightcoral";
                case STATUS_CONTACT:
                    return "lightblue";
                case STATUS_QUALIFIER:
                    return "red";
                case STATUS_BOOKED:
                    return "lightgreen";
            }
        }

        function getStreetNames() {
            const result = localStorage.getItem("streetNames");

            if (!result) {
                localStorage.setItem("streetNames", "");
                return [];
            } else {
                return result.split(",");
            }
        }

        function setStreetNames(streetNames) {
            localStorage.setItem("streetNames", streetNames);
        }

        function getDoor(streetName, door) {
            const text = localStorage.getItem(`${streetName}_${door}`);

            if (text) {
                return parseInt(text);
            } else {
                return STATUS_UNKNOCKED;
            }
        }

        function setDoor(streetName, door, status) {
            const address = `${streetName}_${door}`;

            if (status === STATUS_UNKNOCKED) {
                localStorage.removeItem(address);
            } else {
                console.log(`${streetName} ${door} ${status}`);
                localStorage.setItem(address, status);
            }
        }

        function createStreet(streetName) {
            const streetNames = getStreetNames();
            streetNames.push(streetName);
            setStreetNames(streetNames);
        }

        const newStreetView = document.querySelector("#new-street-view");
        const streetMenuView = document.querySelector("#street-menu-view");
        const streetView = document.querySelector("#street-view");

        function newStreetPage() {
            newStreetView.style.display = "grid";
            streetMenuView.style.display = "none";
            streetView.style.display = "none";
        }

        function streetMenuPage() {
            streetMenuView.style.display = "grid";
            newStreetView.style.display = "none";
            streetView.style.display = "none";

            const streets = document.querySelector("#streets");
            const streetNames = getStreetNames();

            streets.replaceChildren();

            if (streetNames.length === 0) {
                const noStreets = document.createElement("span");
                noStreets.innerText = "No streets";
                streets.appendChild(noStreets);
            }

            for (const streetName of streetNames) {
                const button = document.createElement("button");
                button.innerText = streetName;
                button.addEventListener("click", _ => streetPage(streetName));
                streets.appendChild(button);
            }
        }

        function streetPage(streetName) {
            streetView.style.display = "grid";
            newStreetView.style.display = "none";
            streetMenuView.style.display = "none";

            document.querySelector("#current-street").innerText = streetName;

            const doors = document.querySelector("#doors");

            doors.replaceChildren();

            for (let no = 1; no <= 200; no++) {
                const status = getDoor(streetName, no);

                const button = document.createElement("button");
                const noText = document.createElement("span");
                const statusText = document.createElement("span");

                noText.classList.add("door-no");
                statusText.classList.add("status");

                button.style.backgroundColor = statusToBg(status);
                noText.innerText = no;
                statusText.innerText = statusToString(status);

                button.appendChild(noText);
                button.appendChild(statusText);
                doors.appendChild(button);

                button.addEventListener("click", _ => {
                    const status = nextStatus(getDoor(streetName, no));
                    setDoor(streetName, no, status);
                    statusText.innerText = statusToString(getDoor(streetName, no));
                    button.style.backgroundColor = statusToBg(status);
                });
            }
        }

        document.querySelector("#street-name").addEventListener("keypress", event => {
            document.querySelector("#add-street").disabled = event.target.value.length === 0;
        })

        document.querySelector("#add-street").addEventListener("click", _ => {
            const streetNameInput = document.querySelector("#street-name");
            const streetName = streetNameInput.value;
            if (streetName.length !== 0) {
                streetNameInput.value = "";
                createStreet(streetName);
                streetMenuPage();
            }
        });

        document.querySelector("#cancel").addEventListener("click", _ => {
            document.querySelector("#street-name").value = "";
            streetMenuPage()
        });

        document.querySelector("#add-new-street").addEventListener("click", _ => newStreetPage());

        document.querySelector("#clean-up").addEventListener("click", _ => {
            const mfIsSure = confirm("This will erase absolutely everything!\nDo it if you fuck up or AT THE END OF THE DAY");

            if (mfIsSure) {
                localStorage.clear();
                streetMenuPage();
            }
        });

        document.querySelector("#back").addEventListener("click", _ => streetMenuPage());

        streetMenuPage();
    </script>
</body>
</html>
