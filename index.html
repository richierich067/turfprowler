<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TurfProwler</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2f7d32">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        * {
            font-family: monospace;
            text-transform: uppercase;
            font-size: 1rem;
        }

        body {
            margin: 0;
            padding: none;
            border: none;
            background-color: #555555;
            color: white;
        }

        button {
            border: none;
        }

        #new-street-view {
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-columns: 25vw 25vw 25vw 25vw;
            grid-template-rows: 40vh 10vh 10vh 40vh;
        }

        #new-street-view #add-street {
            grid-column-start: 2;
            grid-column-end: 3;
            grid-row-start: 3;
            grid-row-end: 4;
            margin: 0.5rem;
            background-color: lightgreen;;
        }

        #new-street-view #cancel {
            grid-column-start: 3;
            grid-column-end: 4;
            grid-row-start: 3;
            grid-row-end: 4;
            margin: 0.5rem;
            background-color: lightcoral;
        }

        #new-street-view #street-name {
            grid-row-start: 2;
            grid-row-end: 3;
            grid-column-start: 1;
            grid-column-end: 5;
            margin: 0.5rem;
            font-size: 2rem;
        }

        #street-menu-view {
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-columns: 60vw 20vw 20vw;
            grid-template-rows: 90vh 10vh;
        }

        #street-menu-view #streets {
            grid-column: 1 / 4;
            grid-row: 1 / 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-y: scroll;
            gap: 0.25rem;
        }

        #street-menu-view #streets button {
            display: block;
            width: 100%;
            height: 3rem;
            background-color: lightgray;
        }

        #street-menu-view #add-new-street {
            grid-column: 1 / 1;
            grid-row-start: 2;
            grid-row-end: 2;
            background-color: lightgreen;
            margin: 1rem;
        }

        #street-menu-view #clean-up {
            grid-column: 3 / 3;
            grid-row: 2 / 2;
            background-color: lightcoral;
            margin: 1rem;
        }

        #street-menu-view #show-stats-view {
            grid-column: 2 / 2;
            grid-row: 2 / 2;
            margin: 1rem;
            background-color: lightblue;
        }

        #street-view {
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-rows: 10vh 90vh;
        }

        #street-view #nav {
            width: 100vw;
            grid-row-start: 1;
            grid-row-end: 2;
            display: grid;
            grid-template-columns: 20vw 50vw 30vw;
        }

        #street-view #nav #current-street {
            grid-column-start: 2;
            grid-column-end: 3;
            display: block;
            text-align: right;
            margin: 1rem;
            font-size: 1.5rem;
            text-align: left;
            height: 2rem;
        }

        #street-view #nav #ratios {
            padding: 0.5rem;
            grid-column: 3 / 3;
            display: grid;
            grid-template-columns: 6vw 6vw 6vw 6vw;
        }

        #street-view #nav #ratios span {
            font-size: 1rem;
            text-align: center;
        }

        #street-view #nav #back {
            grid-column-start: 1;
            grid-column-end: 2;
            margin: 1rem;
            background-color: lightcoral;
            height: 2rem;
        }

        #street-view #doors {
            display: grid;
            grid-column-gap: 0.5rem;
            row-gap: 0.5rem;
            grid-template-columns: 5rem 5rem 5rem 5rem 5rem;
            grid-auto-rows: 3rem;
            justify-self: center;
            overflow-y: scroll;
        }

        #street-view #doors button {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .door-no {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .status {
            font-style: italic;
        }

        #stats-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #stats-view #stats {
            display: grid;
            grid-gap: 2rem;
            grid-template-columns: 12vw 12vw 12vw 12vw 12vw;
        }
        
        #stats-view #stats span {
            text-align: center;
        }
        
        #stats-view #back {
            background-color: lightcoral;
            height: 3rem;
            margin: 0.5rem;
        }
    </style>
</head>
<body>
    <div id="new-street-view">
        <input type="text" id="street-name" value=""/>
        <button id="add-street" disabled>Add</button>
        <button id="cancel">Cancel</button>
    </div>
    <div id="street-menu-view">
        <div id="streets">
            <!-- Streets go here -->
        </div>
        <button id="add-new-street">New Street</button>
        <button id="show-stats-view">Stats</button>
        <button id="clean-up">Clean Up</button>
    </div>
    <div id="stats-view">
        <button id="back">Back</button>
        <div id="stats">
            <span>Hour</span>
            <span>K</span>
            <span>C</span>
            <span>Q</span>
            <span>B</span>
        </div>
    </div>
    <div id="street-view">
        <div id="nav">
            <button id="back">Back</button>
            <span id="current-street"></span>
            <div id="ratios">
                <span>K</span>
                <span>C</span>
                <span>Q</span>
                <span>B</span>
                <span id="ratios-k"></span>
                <span id="ratios-c"></span>
                <span id="ratios-q"></span>
                <span id="ratios-b"></span>
            </div>
        </div>
        <div id="doors">
            <!-- Doors go here -->
        </div>
    </div>
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("./sw.js");
            });
        }
    </script>
    <script>
        const STATUS_UNKNOCKED = 0;
        const STATUS_KNOCKED = 1;
        const STATUS_CONTACT = 2;
        const STATUS_QUALIFIER = 3;
        const STATUS_BOOKED = 4;

        function nextStatus(status) {
            return (status + 1) % (STATUS_BOOKED + 1);
        }

        function statusToString(status) {
            switch (status) {
                case STATUS_UNKNOCKED:
                    return "U";
                case STATUS_KNOCKED:
                    return "K";
                case STATUS_CONTACT:
                    return "C";
                case STATUS_QUALIFIER:
                    return "Q";
                case STATUS_BOOKED:
                    return "B";
            }
        }

        function statusToBg(status) {
            switch (status) {
                case STATUS_UNKNOCKED:
                    return "#777777";
                case STATUS_KNOCKED:
                    return "lightcoral";
                case STATUS_CONTACT:
                    return "lightblue";
                case STATUS_QUALIFIER:
                    return "red";
                case STATUS_BOOKED:
                    return "lightgreen";
            }
        }

        function getStreetNames() {
            const result = localStorage.getItem("streetNames");

            if (!result) {
                localStorage.setItem("streetNames", "");
                return [];
            } else {
                return result.split(",");
            }
        }

        function setStreetNames(streetNames) {
            localStorage.setItem("streetNames", streetNames);
        }

        function getDoor(streetName, door) {
            const text = localStorage.getItem(`${streetName}_${door}`);

            if (text) {
                return parseInt(text);
            } else {
                return STATUS_UNKNOCKED;
            }
        }

        function setDoor(streetName, door, status) {
            const address = `${streetName}_${door}`;

            if (status === STATUS_UNKNOCKED) {
                localStorage.removeItem(address);
            } else {
                console.log(`${streetName} ${door} ${status}`);
                localStorage.setItem(address, status);
            }
        }

        function createStreet(streetName) {
            const streetNames = getStreetNames();
            streetNames.push(streetName);
            setStreetNames(streetNames);
        }

        function setRatios({ k, c, q, b }) {
            const hour = new Date().getHours();
            localStorage.setItem(`ratios_${hour}`, `${k},${c},${q},${b}`);
        }

        function getRatios() {
            const hour = new Date().getHours();
            const result = localStorage.getItem(`ratios_${hour}`);

            if (result) {
                const [ k, c, q, b ] = result.split(",").map(x => parseInt(x));
                return { k, c, q, b };
            } else {
                return { k: 0, c: 0, q: 0, b: 0 };
            }
        }

        function displayRatios({ k, c, q, b }) {
            document.querySelector("#ratios-k").innerText = k;
            document.querySelector("#ratios-c").innerText = c;
            document.querySelector("#ratios-q").innerText = q;
            document.querySelector("#ratios-b").innerText = b;
        }

        const newStreetView = document.querySelector("#new-street-view");
        const streetMenuView = document.querySelector("#street-menu-view");
        const streetView = document.querySelector("#street-view");
        const statsView = document.querySelector("#stats-view");

        function newStreetPage() {
            newStreetView.style.display = "grid";
            streetMenuView.style.display = "none";
            streetView.style.display = "none";
            statsView.style.display = "none";
        }

        function streetMenuPage() {
            streetMenuView.style.display = "grid";
            newStreetView.style.display = "none";
            streetView.style.display = "none";
            statsView.style.display = "none";

            const streets = document.querySelector("#streets");
            const streetNames = getStreetNames();

            streets.replaceChildren();

            if (streetNames.length === 0) {
                const noStreets = document.createElement("span");
                noStreets.innerText = "No streets";
                streets.appendChild(noStreets);
            }

            for (const streetName of streetNames) {
                const button = document.createElement("button");
                button.innerText = streetName;
                button.addEventListener("click", _ => streetPage(streetName));
                streets.appendChild(button);
            }
        }

        function statsPage() {
            streetMenuView.style.display = "none";
            newStreetView.style.display = "none";
            streetView.style.display = "none";
            statsView.style.display = "grid";

            const total = { k: 0, c: 0, q: 0, b: 0 };
            const allRatios = [];

            for (let i = 0; i < 24; ++i) {
                const result = localStorage.getItem(`ratios_${i}`);

                if (result) {
                    const [k, c, q, b] = result.split(",").map(x => parseInt(x));
                    total.k += k;
                    total.c += c;
                    total.q += q;
                    total.b += b;
                    allRatios.push({ hour: i, k, c, q, b });
                }
            }

            allRatios.push({ hour: "Total", ...total });

            for (const ratios of allRatios) {
                console.log(ratios);
                const hour = document.createElement("span");
                const k = document.createElement("span")
                const c = document.createElement("span");
                const q = document.createElement("span");
                const b = document.createElement("span");

                hour.innerText = ratios.hour;
                k.innerText = ratios.k;
                c.innerText = ratios.c;
                q.innerText = ratios.q;
                b.innerText = ratios.b;

                document.querySelector("#stats").append(hour, k, c, q, b);
            }
        }

        function streetPage(streetName) {
            streetView.style.display = "grid";
            newStreetView.style.display = "none";
            streetMenuView.style.display = "none";
            statsView.style.display = "none";

            document.querySelector("#current-street").innerText = streetName;

            displayRatios(getRatios());

            const doors = document.querySelector("#doors");

            doors.replaceChildren();

            for (let no = 1; no <= 200; no++) {
                const status = getDoor(streetName, no);

                const button = document.createElement("button");
                const noText = document.createElement("span");
                const statusText = document.createElement("span");

                noText.classList.add("door-no");
                statusText.classList.add("status");

                button.style.backgroundColor = statusToBg(status);
                noText.innerText = no;
                statusText.innerText = statusToString(status);

                button.appendChild(noText);
                button.appendChild(statusText);
                doors.appendChild(button);

                button.addEventListener("click", _ => {
                    const status = nextStatus(getDoor(streetName, no));
                    setDoor(streetName, no, status);
                    statusText.innerText = statusToString(getDoor(streetName, no));
                    button.style.backgroundColor = statusToBg(status);

                    const ratios = getRatios();

                    switch (status) {
                        case STATUS_KNOCKED:
                            ratios.k += 1;
                            break;
                        case STATUS_CONTACT:
                            ratios.c += 1;
                            break;
                        case STATUS_QUALIFIER:
                            ratios.q += 1;
                            break;
                        case STATUS_BOOKED:
                            ratios.b += 1;
                            break;
                        case STATUS_UNKNOCKED:
                            ratios.k -= 1;
                            ratios.c -= 1;
                            ratios.q -= 1;
                            ratios.b -= 1;
                            break;
                    }

                    setRatios(ratios);
                    displayRatios(ratios);
                });
            }
        }

        document.querySelector("#street-name").addEventListener("keypress", event => {
            document.querySelector("#add-street").disabled = event.target.value.length === 0;
        })

        document.querySelector("#add-street").addEventListener("click", _ => {
            const streetNameInput = document.querySelector("#street-name");
            const streetName = streetNameInput.value;
            if (streetName.length !== 0) {
                streetNameInput.value = "";
                createStreet(streetName);
                streetMenuPage();
            }
        });

        document.querySelector("#cancel").addEventListener("click", _ => {
            document.querySelector("#street-name").value = "";
            streetMenuPage()
        });

        document.querySelector("#add-new-street").addEventListener("click", _ => newStreetPage());

        document.querySelector("#clean-up").addEventListener("click", _ => {
            const mfIsSure = confirm("This will erase absolutely everything!\nDo it if you fuck up or AT THE END OF THE DAY");

            if (mfIsSure) {
                localStorage.clear();
                streetMenuPage();
            }
        });

        document.querySelectorAll("#back").forEach(btn => btn.addEventListener("click", _ => streetMenuPage()));

        document.querySelector("#show-stats-view").addEventListener("click", _ => statsPage());

        streetMenuPage();
    </script>
</body>
</html>
